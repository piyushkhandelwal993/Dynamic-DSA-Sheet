name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            artifact: macos-intel
            arch: x64
          - os: macos-14
            artifact: macos-apple-silicon
            arch: arm64
          - os: windows-latest
            artifact: windows-x64
            arch: x64
          - os: ubuntu-latest
            artifact: linux-x64
            arch: x64

    runs-on: ${{ matrix.os }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify Java toolchain
        run: |
          java -version
          javac -version

      - name: Install C++ compiler on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install mingw -y --no-progress

          $compiler = Get-ChildItem "C:\ProgramData\mingw64" -Filter "g++.exe" -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $compiler) {
            throw "MinGW installation completed, but g++.exe was not found."
          }

          $compiler.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $compiler.FullName --version

      - name: Verify C++ toolchain
        run: g++ --version

      - name: Install dependencies
        run: npm ci

      - name: Run production release gate
        run: npm run release:check

      - name: Build installers
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            npm run build
            npx electron-builder --${{ matrix.arch }} --publish always
          else
            npm run build
            npx electron-builder --${{ matrix.arch }} --publish never
          fi
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact }}
          path: release/**
