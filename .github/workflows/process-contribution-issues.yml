name: Process Contribution Issues

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled
      - unlabeled
      - closed

permissions:
  contents: write
  issues: read

jobs:
  process-contribution-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Process contribution issue
        run: node scripts/process-contribution-issue.mjs "$GITHUB_EVENT_PATH"

      - name: Commit review status updates
        run: |
          if git diff --quiet -- contributions/review-status.json src/data; then
            echo "No review status or content changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git add contributions/review-status.json src/data
          git commit -m "Update contribution review status for issue #${{ github.event.issue.number }}"
          git pull --rebase origin main
          git push
