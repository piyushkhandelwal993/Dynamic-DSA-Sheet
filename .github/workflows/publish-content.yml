name: Publish Content Bundle

on:
  push:
    branches:
      - main
    paths:
      - "src/data/**"
      - "src/types/**"
      - "src/services/catalog.ts"
      - "scripts/export-content-bundle.mjs"
      - "package.json"
      - ".github/workflows/publish-content.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: content-pages
  cancel-in-progress: true

jobs:
  publish-content:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export content bundle
        env:
          CONTENT_BASE_URL: https://piyushkhandelwal993.github.io/Dynamic-DSA-Sheet/content/
        run: npm run content:export

      - name: Prepare Pages artifact
        run: |
          mkdir -p .pages/content
          cp -R site/. .pages/
          cp -R release/content/. .pages/content/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
