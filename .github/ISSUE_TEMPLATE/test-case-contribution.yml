name: Test Case Contribution
description: Submit a new test case or bulk test cases for an existing problem.
title: "[Contribution][Test Case] <problem-id> · <contribution-id>"
labels:
  - contribution
  - test-case
body:
  - type: markdown
    attributes:
      value: |
        Submit exported contribution details from the desktop app. Use one issue per local contribution id.
  - type: input
    id: contribution_id
    attributes:
      label: Contribution ID
      description: Paste the contribution id shown in the app detail view.
      placeholder: contrib_20260701_abcd1234
    validations:
      required: true
  - type: input
    id: problem_id
    attributes:
      label: Problem ID
      placeholder: arr-003
    validations:
      required: true
  - type: dropdown
    id: contribution_type
    attributes:
      label: Contribution Type
      options:
        - test-case
        - bulk-test-cases
    validations:
      required: true
  - type: textarea
    id: exported_payload
    attributes:
      label: Exported Contribution Payload
      description: Paste the JSON payload from the contribution detail modal or queued file.
      render: json
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Optional Notes
      description: Add any context for why this case matters.
